name: Docs or example improvement
description: Suggest a correction to README, docs, examples, prompts, or use cases.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Location
      description: Link to the README section, file, example, prompt, or use case.
      placeholder: README.md#quick-start
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should change?
      description: Explain the unclear, stale, missing, or incorrect part.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected correction
      description: Suggest replacement copy, a corrected command, or the desired example behavior.
    validations:
      required: false
